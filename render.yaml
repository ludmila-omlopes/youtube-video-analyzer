services:
  - type: keyvalue
    name: youtube-analyzer-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: noeviction

  - type: web
    name: youtube-analyzer-mcp
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start:http
    healthCheckPath: /healthz
    envVars:
      - key: HOSTED_RUNTIME_ROLE
        value: web
      - key: CLOUD_DURABILITY_MODE
        value: require_redis
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: youtube-analyzer-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: youtube-analyzer-redis
          property: port
      - key: GEMINI_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: OAUTH_ENABLED
        value: "true"
      - key: OAUTH_ISSUER
        sync: false
      - key: OAUTH_AUDIENCE
        sync: false
      - key: OAUTH_JWKS_URL
        sync: false
      - key: OAUTH_REQUIRED_SCOPE
        value: mcp:access
      - key: OAUTH_WEB_CLIENT_ID
        sync: false
      - key: OAUTH_WEB_AUTHORIZATION_URL
        sync: false
      - key: OAUTH_WEB_TOKEN_URL
        sync: false
      - key: OAUTH_WEB_REDIRECT_PATH
        value: /app
      - key: OAUTH_WEB_SCOPES
        value: openid profile mcp:access
      - key: OAUTH_WEB_AUDIENCE
        sync: false
      - key: OAUTH_WEB_RESOURCE
        sync: false

  - type: worker
    name: youtube-analyzer-mcp-worker
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start:worker
    envVars:
      - key: HOSTED_RUNTIME_ROLE
        value: worker
      - key: CLOUD_DURABILITY_MODE
        value: require_redis
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: youtube-analyzer-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: youtube-analyzer-redis
          property: port
      - key: GEMINI_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false

  - type: web
    name: youtube-analyzer-mcp-admin
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start:admin
    healthCheckPath: /healthz
    envVars:
      - key: HOSTED_RUNTIME_ROLE
        value: admin
      - key: CLOUD_DURABILITY_MODE
        value: require_redis
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: youtube-analyzer-redis
          property: connectionString
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: BULL_BOARD_READ_ONLY
        value: "true"
